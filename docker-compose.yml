services:
  client:
    build: ./client
    ports:
      - "5173:5173"

  server:
    build: ./server
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: education_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
