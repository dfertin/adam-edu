version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lms_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: education_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.11-slim
    container_name: lms_backend
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python -c 'from app.database import Base, engine; from app.models import User; Base.metadata.create_all(bind=engine)' && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    container_name: lms_frontend
    volumes:
      - ./client:/app
    ports:
      - "5173:5173"
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data: